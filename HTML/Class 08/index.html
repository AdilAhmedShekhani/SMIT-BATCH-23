<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <!-- Images -->

    <!-- Download Image Then Call -->

    <img src="image.jpg" alt="Description of the image">

    <!-- Image Upload from web -->
    <img src="https://example.com/image.jpg" alt="Description of the image">

    <!-- Image Height and Width -->
    <img src="image.jpg" alt="Description of the image" width="500" height="300">

    <!-- Image Alignment -->
    <img src="image.jpg" alt="Description of the image" align="left">

    <!-- Image Title -->
    <img src="image.jpg" alt="Description of the image" title="Title of the image">

    <!-- Image Figure -->
    <figure>
        <img src="image.jpg" alt="Description of the image">
        <figcaption>Caption for the image</figcaption>
    </figure>

</body>

</html>
